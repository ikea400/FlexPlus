name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Set default timezone for the runner environment
env:
  TZ: America/Montreal

# Cancel in-progress runs for the same branch on new pushes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck · Lint · Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ["22.x"]

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5

      # ── Node.js setup ─────────────────────────────────────────────────────
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      # ── Playwright Browser Cache ──────────────────────────────────────────
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      # ── Dependencies ──────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Type checking ─────────────────────────────────────────────────────
      - name: TypeScript typecheck
        run: npm run typecheck

      # ── Linting ───────────────────────────────────────────────────────────
      - name: ESLint
        run: npm run lint

      # ── Unit tests ────────────────────────────────────────────────────────
      - name: Run tests
        run: npm test

  deploy:
    name: Deploy to VM (Self-Hosted Runner)
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Copy local .env from VM
        run: cp ~/.env.flexplus .env

      - name: Start production container
        run: |
          docker compose down
          docker compose up -d --build scraper
